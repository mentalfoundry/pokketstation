# DESCRIPTION: GitLab CI/CD for libRetro (NOT FOR GitLab-proper)
#
# This project builds with CMake, not a plain libretro Makefile, so it uses
# the "-cmake" variant of each platform template rather than the
# Makefile-oriented ones (windows-x64-mingw.yml, linux-x64.yml, etc.) most
# libretro cores use. swanstation (also CMake-based) is the working
# precedent this was modeled on. Scope is deliberately limited to the
# platforms that actually have a "-cmake" template available in this shared
# repo - there's no CMake equivalent for the Makefile/devkitPro-only console
# targets (GameCube/Wii/WiiU/Switch), nor for iOS/tvOS, so those aren't
# included here; add them if/when this project needs them and an
# appropriate template exists.

##############################################################################
################################# BOILERPLATE ################################
##############################################################################

# Core definitions
.core-defs:
  variables:
    CORENAME: pokketstation
    CORE_ARGS: -DCMAKE_BUILD_TYPE=Release

# Inclusion templates, required for the build to work
include:
  ################################## DESKTOPS ################################
  # Windows (MSVC)
  - project: 'libretro-infrastructure/ci-templates'
    file: '/windows-cmake-msvc19.yml'

  # MacOS
  - project: 'libretro-infrastructure/ci-templates'
    file: '/osx-cmake-x86.yml'

  # MacOS ARM 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/osx-cmake-arm64.yml'

  # Linux
  - project: 'libretro-infrastructure/ci-templates'
    file: '/linux-cmake.yml'

  ################################## CELLULAR ################################
  # Android
  - project: 'libretro-infrastructure/ci-templates'
    file: '/android-cmake.yml'

  #################################### MISC ##################################
  # webOS (LGTV)
  - project: 'libretro-infrastructure/ci-templates'
    file: '/webos-cmake.yml'

# Stages for building
stages:
  - build-prepare
  - build-shared

##############################################################################
#################################### STAGES ##################################
##############################################################################
#
################################### DESKTOPS #################################
# Windows 64-bit
libretro-build-windows-x64:
  extends:
    - .libretro-windows-msvc19-cmake-x86_64
    - .core-defs
  variables:
    # windows-cmake-msvc19.yml builds with a multi-config VS generator, which
    # always appends its own Release/Debug subfolder under $BUILD_DIR on top
    # of CMAKE_RUNTIME_OUTPUT_DIRECTORY (see the comment in CMakeLists.txt) -
    # this is the one platform here that still needs EXTRA_PATH.
    EXTRA_PATH: Release

# Windows 32-bit
libretro-build-windows-i686:
  extends:
    - .libretro-windows-msvc19-cmake-x86
    - .core-defs
  variables:
    EXTRA_PATH: Release

# Linux 64-bit
libretro-build-linux-x64:
  extends:
    - .libretro-linux-cmake-x86_64
    - .core-defs

# Linux 32-bit
libretro-build-linux-i686:
  extends:
    - .libretro-linux-cmake-x86
    - .core-defs

# Linux 64-bit (ARM)
libretro-build-linux-aarch64:
  extends:
    - .libretro-linux-cmake-aarch64
    - .core-defs

# MacOS 64-bit
libretro-build-osx-x64:
  extends:
    - .libretro-osx-cmake-x86
    - .core-defs

# MacOS arm64
libretro-build-osx-arm64:
  extends:
    - .libretro-osx-cmake-arm64
    - .core-defs

################################### CELLULAR #################################
# Android ARMv7a
android-armeabi-v7a:
  extends:
    - .libretro-android-cmake-armeabi-v7a
    - .core-defs

# Android ARMv8a
android-arm64-v8a:
  extends:
    - .libretro-android-cmake-arm64-v8a
    - .core-defs

# Android 64-bit x86_64
android-x86_64:
  extends:
    - .libretro-android-cmake-x86_64
    - .core-defs

# Android 32-bit x86
android-x86:
  extends:
    - .libretro-android-cmake-x86
    - .core-defs

#################################### MISC ##################################
# webOS 32-bit
libretro-build-webos-armv7a:
  extends:
    - .libretro-webos-armv7a-cmake
    - .core-defs
