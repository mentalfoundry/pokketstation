name: Create Release (Windows)

# Manual only. Trigger from the Actions tab ("Run workflow") when you want
# to publish a tagged GitHub Release with the desktop app and libretro core
# attached as downloadable zips. Always builds Release config - a public
# release should never ship debug binaries.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version (e.g. v0.1.0)"
        required: true
        type: string
      draft:
        description: "Create as a draft (review before publishing) rather than publishing immediately"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Self-contained vcpkg bootstrap, same reasoning as the artifact-only
      # workflow: the runner image's preinstalled vcpkg lives at a path that
      # varies between image versions, so don't depend on it.
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-x64-windows-sdl2-${{ runner.os }}-v1

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "vcpkg\vcpkg.exe")) {
            if (-not (Test-Path "vcpkg")) {
              git clone https://github.com/microsoft/vcpkg.git
            }
            .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          .\vcpkg\vcpkg.exe install sdl2:x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -S . -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Stage desktop app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\desktop | Out-Null
          Copy-Item "build\frontends\desktop\Release\pokketstation_desktop.exe" dist\desktop\
          Copy-Item "vcpkg\installed\x64-windows\bin\SDL2.dll" dist\desktop\
          Copy-Item README.md, LICENSE dist\desktop\

      - name: Stage libretro core
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\libretro | Out-Null
          Copy-Item "build\frontends\libretro\Release\pokketstation_libretro.dll" dist\libretro\
          Copy-Item README.md, LICENSE dist\libretro\

      - name: Zip release assets
        shell: pwsh
        run: |
          Compress-Archive -Path dist\desktop\* -DestinationPath "pokketstation-desktop-windows-${{ inputs.version }}.zip"
          Compress-Archive -Path dist\libretro\* -DestinationPath "pokketstation-libretro-windows-${{ inputs.version }}.zip"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Array splat instead of a plain string flag: an empty string
          # passed as a trailing argument to a native exe in PowerShell is
          # NOT stripped like an empty shell-variable expansion would be in
          # bash - gh would see it as a literal extra (invalid) argument.
          # An empty array splats to zero arguments, which is what we want
          # when --draft shouldn't be passed at all.
          $extraArgs = @()
          if ("${{ inputs.draft }}" -eq "true") { $extraArgs += "--draft" }
          gh release create "${{ inputs.version }}" `
            "pokketstation-desktop-windows-${{ inputs.version }}.zip" `
            "pokketstation-libretro-windows-${{ inputs.version }}.zip" `
            --title "${{ inputs.version }}" `
            --generate-notes `
            @extraArgs
